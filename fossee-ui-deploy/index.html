<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Booking UI Demo</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/modern-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            text-align: center;
        }

        .demo-container {
            max-width: 600px;
            width: 100%;
        }

        .demo-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .demo-link {
            display: block;
            margin: 15px 0;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .demo-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="demo-container">
        <div class="demo-card">
            <h1 style="color: #6366f1; margin-bottom: 10px; font-weight: 700;">Workshop Booking</h1>
            <p style="color: #64748b; margin-bottom: 30px; font-size: 1.1rem;">Vercel Static UI Demonstration</p>

            <a href="login.html" class="demo-link">Login Page</a>
            <a href="register.html" class="demo-link">Registration Page</a>
            <a href="forgot-password.html" class="demo-link">Forgot Password</a>
        </div>
    </div>
</body>

</html>
