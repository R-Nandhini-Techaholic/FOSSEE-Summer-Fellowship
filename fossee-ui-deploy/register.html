<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - FOSSEE Workshops</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/modern-ui.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- React Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Virtual Context -->
    <script>
        window.DJANGO_CONTEXT = {
            staticUrl: "./assets/",
            urls: {
                home: "index.html",
                login: "login.html",
                register: "register.html",
                passwordReset: "forgot-password.html",
                propose: "#",
                profile: "#",
                logout: "#",
            },
            user: {
                isAuthenticated: false,
                isCoordinator: false,
                isInstructor: false
            },
            formErrors: [],
            csrfToken: "dummy_csrf_token"
        };
    </script>
    <style>
        .errorlist {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Navbar Container -->
    <nav class="navbar navbar-expand-lg navbar-dark react-navbar-container">
        <div id="react-navbar-root" style="width: 100%;"></div>
    </nav>

    <!-- Main Content -->
    <div class="main-content" style="min-height: 80vh; display: flex; align-items: center; padding-top: 40px;">
        <div class="container pb-4">
            <div id="react-register-root"></div>
        </div>
    </div>

    <!-- Footer -->
    <div id="wrapper">
        <div id="footer">
            <p>&copy; 2026 FOSSEE | IIT Bombay. Built with a Modern UX.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script type="text/babel" src="./js/components.js"></script>
    <script type="text/babel" src="./js/Navbar.js"></script>
    <script type="text/babel" src="./js/RegisterForm.js"></script>
    <script type="text/babel">
        if (document.getElementById('react-navbar-root')) {
            const root = ReactDOM.createRoot(document.getElementById('react-navbar-root'));
            root.render(<window.ReactComponents.Navbar />);
        }
        if (document.getElementById('react-register-root')) {
            const root = ReactDOM.createRoot(document.getElementById('react-register-root'));
            root.render(<window.ReactComponents.RegisterForm />);
        }
    </script>
</body>

</html>
