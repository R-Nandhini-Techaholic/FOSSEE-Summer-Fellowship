{% extends 'workshop_app/base.html' %}
{% load static %}
	{% block title %}
		Register
	{% endblock %}

{% block content %}
	<div id="react-register-root"></div>
	<script>
      window.DJANGO_CONTEXT = window.DJANGO_CONTEXT || {};
      window.DJANGO_CONTEXT.csrfToken = "{{ csrf_token }}";
      window.DJANGO_CONTEXT.formErrors = [
          {% if form.errors %}
              {% for field in form %}
                  {% for error in field.errors %}
                      "{{ field.label }}: {{ error|escapejs }}",
                  {% endfor %}
              {% endfor %}
              {% for error in form.non_field_errors %}
                  "{{ error|escapejs }}",
              {% endfor %}
          {% endif %}
      ];
	</script>
	<script type="text/babel" src="{% static 'workshop_app/react/RegisterForm.js' %}"></script>
	<script type="text/babel">
      const registerRoot = ReactDOM.createRoot(document.getElementById('react-register-root'));
      registerRoot.render(<window.ReactComponents.RegisterForm />);
	</script>
{% endblock %}
